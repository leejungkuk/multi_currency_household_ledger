spring:
  datasource:
    url: jdbc:mysql://localhost:3306/exchange_ledger?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

  jackson:
    time-zone: Asia/Seoul

jwt:
  secret: exchange-rate-calculator-jwt-secret-key-must-be-at-least-256-bits-long
  expiration: 3600000  # 1 hour

exchange:
  eximbank:
    api-url: https://oapi.koreaexim.go.kr/site/program/financial/exchangeJSON
    auth-key: ${EXIMBANK_AUTH_KEY:your-auth-key-here}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
