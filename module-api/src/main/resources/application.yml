spring:
  profiles:
    include: secret

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_JWT_ISSUER_URI}

  jackson:
    time-zone: Asia/Seoul

jwt:
  expiration: 3600000  # 1 hour

woni:
  security:
    jwt:
      audience: ${SUPABASE_JWT_AUDIENCE:authenticated}
    cors:
      allowed-origins: ${WONI_CORS_ALLOWED_ORIGINS:http://localhost:3000}

exchange:
  eximbank:
    api-url: https://oapi.koreaexim.go.kr/site/program/financial/exchangeJSON
    connect-timeout: ${EXIMBANK_CONNECT_TIMEOUT:2s}
    read-timeout: ${EXIMBANK_READ_TIMEOUT:5s}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
