spring:
  profiles:
    include: secret

  datasource:
    url: jdbc:mysql://localhost:3306/exchange_ledger?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

  jackson:
    time-zone: Asia/Seoul

jwt:
  expiration: 3600000  # 1 hour

exchange:
  eximbank:
    api-url: https://oapi.koreaexim.go.kr/site/program/financial/exchangeJSON

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
